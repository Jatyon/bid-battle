name: Server CI

on:
  push:
    branches: [main]
    paths: ['server/**', '.github/workflows/server.yml']
  pull_request:
    branches: [main]
    paths: ['server/**']

jobs:
  server-ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      RYUK_CONTAINER_PRIVILEGED: true

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint Server
        run: npm run lint

      - name: Unit Tests
        run: npm run test

      - name: E2E Tests
        run: npm run test:e2e

      - name: Build Server
        run: npm run build
