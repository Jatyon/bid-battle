<ng-container *transloco="let t">
    <div class="forgot-card__header">
        <h1 class="forgot-card__title">{{ t('AUTH.FORGOT_PASSWORD.TITLE') }}</h1>
        <p class="forgot-card__subtitle">{{ t('AUTH.FORGOT_PASSWORD.SUBTITLE') }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="forgot-card__form" novalidate>
        <app-input formControlName="email" type="email" [label]="t('AUTH.FORGOT_PASSWORD.EMAIL')"
            [placeholder]="t('AUTH.FORGOT_PASSWORD.EMAIL_PLACEHOLDER')" autocomplete="email" name="email"
            [errorMessages]="{
                required: t('AUTH.VALIDATION.EMAIL_REQUIRED'),
                email:    t('AUTH.VALIDATION.EMAIL_INVALID')
            }" />

        <app-button type="submit" [loading]="isLoading()" [fullWidth]="true" size="md" [variant]="'primary'">
            {{ t('AUTH.FORGOT_PASSWORD.SUBMIT') }}
        </app-button>
    </form>

    <p class="forgot-card__footer">
        <a routerLink="/auth/login" class="forgot-card__footer-link">
            {{ t('AUTH.FORGOT_PASSWORD.BACK_TO_LOGIN') }}
        </a>
    </p>
</ng-container>
