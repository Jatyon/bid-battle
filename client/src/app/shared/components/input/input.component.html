<div class="input-field" [class.input-field--error]="errorMessage()" [class.input-field--focused]="isFocused()">
    @if (label()) {
    <div class="input-field__label-row">
        <label class="input-field__label" [for]="id()">
            {{ label() }}
            @if (required()) {
            <span class="input-field__required" aria-label="required">*</span>
            }
        </label>
        <ng-content select="[input-suffix]" />
    </div>
    }

    <div class="input-field__wrapper">
        <input class="input-field__input" [class.input-field__input--has-toggle]="isPasswordType()" [id]="id()"
            [type]="effectiveType()" [placeholder]="placeholder()" [disabled]="disabled()" [readOnly]="readonly()"
            [value]="value()" [name]="name()" [attr.autocomplete]="autocomplete() || null"
            [attr.aria-label]="ariaLabel() || null" [attr.aria-describedby]="ariaDescribedByValue() || null"
            (input)="onInput($event)" (focus)="onFocus()" (blur)="onBlur()" />

        @if (isPasswordType()) {
        <button type="button" class="input-field__toggle" (click)="togglePasswordVisibility()"
            [attr.aria-label]="isPasswordVisible() ? 'Hide password' : 'Show password'">
            <lucide-icon [name]="isPasswordVisible() ? eyeOffIcon : eyeIcon" size="18" />
        </button>
        }
    </div>

    <div class="input-field__helper" [class.input-field__helper--reserved]="reserveHelperSpace()">
        @if (errorMessage()) {
        <span class="input-field__error" [id]="errorId()" role="alert">{{ errorMessage() }}</span>
        } @else if (hint()) {
        <span class="input-field__hint" [id]="hintId()">{{ hint() }}</span>
        }
    </div>
</div>
