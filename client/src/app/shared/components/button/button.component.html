<button [type]="type()" [class]="classes()" [disabled]="isDisabled()" (click)="onClick($event)">
    @if (loading()) {
    <app-spinner size="sm" />
    }
    @else {
    <span class="btn__content">
        <ng-content select="[start]"></ng-content>
        <span class="btn__label"><ng-content /></span>
        <ng-content select="[end]"></ng-content>
    </span>
    }
</button>
